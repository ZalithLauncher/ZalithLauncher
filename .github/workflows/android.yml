name: Android CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
      MOVTERY_KEYSTORE_PASSWORD: ${{ secrets.MOVTERY_KEYSTORE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build type
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          BUILD_TYPE="DEBUG"

          if [[ "$COMMIT_MSG" == *"pre-release"* ]]; then
            BUILD_TYPE="PRE_RELEASE"
          elif [[ "$COMMIT_MSG" == *"release"* ]]; then
            BUILD_TYPE="RELEASE"
          fi

          echo "ZL_BUILD_TYPE=${BUILD_TYPE}" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Prepare release metadata
        id: metadata
        run: |
          VERSION_NAME="$(awk -F= '/^launcher_version_name=/{print $2}' ZalithLauncher/gradle.properties)"
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +'%Y%m%d-%H%M%S')"
          TAG_NAME="v${VERSION_NAME}-${BUILD_DATE}-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          RELEASE_NAME="ZalithLauncher ${VERSION_NAME} (${SHORT_SHA})"

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleRelease --no-daemon -Darch=all

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag_name }}
          name: ${{ steps.metadata.outputs.release_name }}
          generate_release_notes: true
          files: |
            ZalithLauncher/build/outputs/apk/release/*.apk
          body: |
            Automated release for commit `${{ github.sha }}`.

            - Launcher version: `${{ steps.metadata.outputs.version_name }}`
            - Branch: `${{ github.ref_name }}`
            - Build date (UTC): `${{ steps.metadata.outputs.build_date }}`

  build-debug:
    if: github.event_name != 'push'
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ "all", "arm", "arm64", "x86", "x86_64" ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build Debug ${{ matrix.arch }}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleDebug --no-daemon -Darch=${{ matrix.arch }}

      - name: Upload Debug ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: ZalithLauncher-Debug-${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/debug/*
